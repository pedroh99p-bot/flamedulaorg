<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlaMedula | Apoie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Plus Jakarta Sans", sans-serif;
        background:
          radial-gradient(circle at top, rgba(231, 76, 90, 0.24), transparent 30%),
          linear-gradient(180deg, #12131a 0%, #090a0e 100%);
        color: #f7f6f3;
        padding: 2rem;
      }
      .panel {
        width: min(100%, 760px);
        padding: 2rem;
        border-radius: 2rem;
        background: rgba(12, 13, 18, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.45);
        text-align: center;
      }
      img {
        width: min(240px, 60vw);
        height: auto;
        margin-bottom: 1.5rem;
      }
      h1 {
        margin: 0 0 1rem;
        font: 700 clamp(2rem, 5vw, 3.75rem) "Space Grotesk", sans-serif;
      }
      p {
        margin: 0 auto 1.5rem;
        max-width: 46ch;
        line-height: 1.7;
        color: rgba(247, 246, 243, 0.76);
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3.25rem;
        padding: 0 1.4rem;
        border-radius: 999px;
        color: #12131a;
        background: #f7f6f3;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <img
        src="https://res.cloudinary.com/dm9mnc97u/image/upload/v1781279524/Untitled_design_17_1_x7qbdx.webp"
        alt="Logo FlaMedula"
      />
      <h1>Pagina de apoio financeiro em construcao.</h1>
      <p>
        A futura experiencia de apoio da FlaMedula sera publicada aqui, em fluxo separado da landing principal,
        com seguranca, clareza e identidade visual consistente.
      </p>
      <a href="/">Voltar para a landing principal</a>
    </main>
  </body>
</html>
